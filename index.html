<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loading App...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .logo {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #ff4b4b;
    }
    p {
      color: #aaa;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 5px solid #333;
      border-top-color: #ff4b4b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1.5rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .hint {
      font-size: 0.8rem;
      color: #555;
      margin-top: 2rem;
    }
    a {
      color: #ff4b4b;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="logo">⚓</div>
  <h1>Anyone Docking</h1>
  <p>Finding the best available server for you...</p>
  <div class="spinner"></div>
  <div class="hint">You will be redirected automatically.</div>

  <script>
    const apps = [
      "https://anyone-docking.streamlit.app/",
      "https://anyone-docking-2.streamlit.app/",
      "https://anyone-docking-3.streamlit.app/",
      "https://anyone-docking-4.streamlit.app/",
      "https://anyone-docking-5.streamlit.app/",
      "https://anyone-docking-6.streamlit.app/"
    ];

    const random = apps[Math.floor(Math.random() * apps.length)];

    // Redirect after 1.5 seconds
    setTimeout(() => {
      window.location.href = random;
    }, 1500);
  </script>
</body>
</html>
