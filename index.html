<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anyone can dock</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red:    #ff4b4b;
      --purple: #cc44cc;
      --blue:   #4b8bff;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 1rem;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 40%, rgba(255,75,75,.07), transparent),
        radial-gradient(ellipse 50% 60% at 80% 60%, rgba(75,139,255,.07), transparent);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp 0.6s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 84px;
      height: 84px;
      margin-bottom: 1.4rem;
      filter: drop-shadow(0 4px 16px rgba(255,75,75,.25));
    }

    h1 {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 0.4rem;
      background: linear-gradient(90deg, #ff4b4b, #cc44cc, #4b8bff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #888;
      font-size: 0.92rem;
      margin-bottom: 2.2rem;
      letter-spacing: 0.01em;
      min-height: 1.3em;
      transition: color 0.3s;
    }

    .spinner {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 4px solid #eee;
      border-top-color: var(--red);
      border-right-color: var(--purple);
      animation: spin 0.9s linear infinite;
      margin-bottom: 2rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-wrap {
      width: 220px;
      height: 4px;
      background: #eee;
      border-radius: 2px;
      margin-bottom: 1.8rem;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--red), var(--purple), var(--blue));
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Server grid */
    .server-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      justify-content: center;
      max-width: 340px;
      margin-bottom: 0.6rem;
    }
    .server-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ddd;
      transition: background 0.3s, transform 0.2s;
      cursor: default;
    }
    .server-dot.checking { background: #f0c040; animation: pulse 1s ease-in-out infinite; }
    .server-dot.online   { background: #4caf50; transform: scale(1.2); }
    .server-dot.slow     { background: #ff9800; }
    .server-dot.offline  { background: #f44336; }
    .server-dot.selected { background: var(--blue); transform: scale(1.5);
                           box-shadow: 0 0 0 3px rgba(75,139,255,.25); }

    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }

    /* Legend */
    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      font-size: 0.72rem;
      color: #aaa;
      margin-bottom: 1.6rem;
    }
    .legend span { display: flex; align-items: center; gap: 4px; }
    .legend i {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .leg-st  { background: #4b8bff; }
    .leg-hf  { background: #4caf50; }
    .leg-off { background: #f44336; }

    .hint {
      font-size: 0.78rem;
      color: #bbb;
      letter-spacing: 0.04em;
    }

    .fallback-btn {
      display: none;
      margin-top: 1.4rem;
      padding: 0.6rem 1.6rem;
      background: linear-gradient(90deg, var(--red), var(--purple));
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.01em;
    }
    .fallback-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo"
      src="https://raw.githubusercontent.com/nyelidl/anyone-docking/main/any-L.svg"
      alt="Anyone can dock logo"/>
    <h1>Anyone can dock,<br>everyone can do!</h1>
    <p class="subtitle" id="status">Checking server availability…</p>
    <div class="spinner"></div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="server-grid" id="serverGrid"></div>
    <div class="legend">
      <span><i class="leg-st"></i> Streamlit</span>
      <span><i class="leg-hf"></i> HuggingFace</span>
      <span><i class="leg-off"></i> Offline</span>
    </div>
    <p class="hint" id="hint">Connecting to the fastest available server</p>
    <button class="fallback-btn" id="fallbackBtn" onclick="redirectToFallback()">
      Open app manually →
    </button>
  </div>

  <script>
    // ── Server list ──────────────────────────────────────────────────────────
    // Streamlit apps are shuffled randomly so load spreads evenly.
    // HuggingFace apps are always awake — used as reliable backup.

    const STREAMLIT = [
      "https://anyone-docking-1.streamlit.app/",
      "https://anyone-docking-2.streamlit.app/",
      "https://anyone-docking-3.streamlit.app/",
      "https://anyone-docking-4.streamlit.app/",
      "https://anyone-docking-5.streamlit.app/",
      "https://anyone-docking-6.streamlit.app/",
      "https://anyone-docking-7.streamlit.app/",
      "https://anyone-docking-8.streamlit.app/",
      "https://anyone-docking-9.streamlit.app/",
      "https://anyone-docking-10.streamlit.app/",
      "https://anyone-docking-11.streamlit.app/",
      "https://anyone-docking-12.streamlit.app/",
      "https://anyone-docking-13.streamlit.app/",
      "https://anyone-docking-14.streamlit.app/",
      "https://anyone-docking-15.streamlit.app/",
      "https://anyone-docking-16.streamlit.app/",
      "https://anyone-docking-17.streamlit.app/",
      "https://anyone-docking-18.streamlit.app/",
      "https://anyone-docking-19.streamlit.app/",
      "https://anyone-docking-20.streamlit.app/",
    ];

    const HUGGING = [
      // kowith account
      "https://kowith-anyone-docking.hf.space/",
      "https://kowith-anyone-docking-2.hf.space/",
      "https://kowith-anyone-docking-3.hf.space/",
      "https://kowith-anyone-docking-4.hf.space/",
      "https://kowith-anyone-docking-5.hf.space/",
      "https://kowith-anyone-docking-6.hf.space/",
      "https://kowith-anyone-docking-7.hf.space/",
      // kowith-2 account
      "https://kowith-2-anyone-docking.hf.space/",
      "https://kowith-2-anyone-docking-2.hf.space/",
      "https://kowith-2-anyone-docking-3.hf.space/",
      "https://kowith-2-anyone-docking-4.hf.space/",
      "https://kowith-2-anyone-docking-5.hf.space/",
      "https://kowith-2-anyone-docking-6.hf.space/",
      "https://kowith-2-anyone-docking-7.hf.space/",
      // kowith-3 account
      "https://kowith-3-anyone-docking.hf.space/",
      "https://kowith-3-anyone-docking-2.hf.space/",
      "https://kowith-3-anyone-docking-3.hf.space/",
      "https://kowith-3-anyone-docking-4.hf.space/",
      "https://kowith-3-anyone-docking-5.hf.space/",
      "https://kowith-3-anyone-docking-6.hf.space/",
      "https://kowith-3-anyone-docking-7.hf.space/",
    ];

    // Shuffle Streamlit randomly so load spreads across all 20 apps
    // (not always sending everyone to app-1 first)
    const shuffled = STREAMLIT.slice().sort(() => Math.random() - 0.5);

    // Final order: shuffled Streamlit first, then HuggingFace as backup
    const APPS = [...shuffled, ...HUGGING];

    // Which indices are Streamlit vs HuggingFace (for dot colouring)
    const IS_HF = APPS.map(u => u.includes(".hf.space"));

    // ── Timing ───────────────────────────────────────────────────────────────
    // Streamlit awake: ~300-800ms   sleeping: 10-20s (→ timeout → offline)
    // HuggingFace:     ~200-600ms   always awake
    // 3s timeout: sleeping Streamlit marked offline, awake ones compete fairly
    const TIMEOUT_MS   = 3000;   // ← shorter timeout filters sleeping ST apps
    const MIN_DELAY_MS = 1200;   // min time on page before redirect
    const FALLBACK_MS  = 10000;  // hard fallback if nothing responds

    // ── State ─────────────────────────────────────────────────────────────────
    const n         = APPS.length;
    const results   = new Array(n).fill(null);
    let   redirected = false;
    let   bestIdx    = -1;
    let   bestMs     = Infinity;
    const startTime  = Date.now();

    // ── Build dot grid ────────────────────────────────────────────────────────
    const grid = document.getElementById("serverGrid");
    const dots = APPS.map((url, i) => {
      const d = document.createElement("div");
      d.className = "server-dot";
      d.title = `Server ${i + 1} (${IS_HF[i] ? "HuggingFace" : "Streamlit"})`;
      grid.appendChild(d);
      return d;
    });

    // ── Helpers ───────────────────────────────────────────────────────────────
    function setStatus(msg)   { document.getElementById("status").textContent = msg; }
    function setHint(msg)     { document.getElementById("hint").textContent = msg; }
    function setProgress(pct) { document.getElementById("progressBar").style.width = pct + "%"; }

    function doRedirect(idx) {
      if (redirected) return;
      redirected = true;
      dots[idx].className = "server-dot selected";
      const type = IS_HF[idx] ? "HuggingFace" : "Streamlit";
      setStatus(`${type} server ready — redirecting…`);
      setHint(`Response time: ${results[idx]?.ms ?? "?"}ms`);
      setProgress(100);
      setTimeout(() => { window.location.href = APPS[idx]; }, 300);
    }

    function redirectToFallback() {
      if (redirected) return;
      doRedirect(bestIdx >= 0 ? bestIdx : Math.floor(Math.random() * n));
    }

    function checkProgress() {
      const done = results.filter(r => r !== null).length;
      setProgress(Math.round((done / n) * 90));
    }

    // ── Ping all servers in parallel ──────────────────────────────────────────
    APPS.forEach((url, i) => {
      dots[i].className = "server-dot checking";

      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), TIMEOUT_MS);
      const t0 = Date.now();

      fetch(url, { mode: "no-cors", signal: controller.signal })
        .then(() => {
          clearTimeout(timer);
          const ms = Date.now() - t0;
          results[i] = { ok: true, ms };

          // Colour: green = fast, orange = slow
          dots[i].className = ms < 2000 ? "server-dot online" : "server-dot slow";
          checkProgress();

          // Track fastest overall
          if (ms < bestMs) { bestMs = ms; bestIdx = i; }

          // Redirect as soon as first fast response + min delay elapsed
          const wait = Math.max(0, MIN_DELAY_MS - (Date.now() - startTime));
          setTimeout(() => {
            if (!redirected && bestIdx >= 0) {
              const online = results.filter(r => r?.ok).length;
              const hfOnline = results.filter((r,j) => r?.ok && IS_HF[j]).length;
              const stOnline = online - hfOnline;
              setStatus(`${online} server(s) online — ${stOnline} Streamlit · ${hfOnline} HuggingFace`);
              doRedirect(bestIdx);
            }
          }, wait);
        })
        .catch(() => {
          clearTimeout(timer);
          results[i] = { ok: false, ms: null };
          dots[i].className = "server-dot offline";
          checkProgress();
        });
    });

    // ── Hard fallback ─────────────────────────────────────────────────────────
    setTimeout(() => {
      if (!redirected) {
        const online = results.map((r,i) => r?.ok ? i : -1).filter(i => i >= 0);
        if (online.length > 0) {
          doRedirect(online[Math.floor(Math.random() * online.length)]);
        } else {
          setStatus("All servers are starting up…");
          document.getElementById("fallbackBtn").style.display = "inline-block";
          doRedirect(Math.floor(Math.random() * n));
        }
      }
    }, FALLBACK_MS);

    // ── Keep Streamlit awake (background pings every 10 min) ──────────────────
    // Prevents Streamlit apps from sleeping so they compete fairly next visit
    setInterval(() => {
      STREAMLIT.forEach(url => {
        fetch(url, { mode: "no-cors" }).catch(() => {});
      });
    }, 10 * 60 * 1000);  // every 10 minutes
  </script>
</body>
</html>
