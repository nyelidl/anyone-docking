<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anyone can dock</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red:    #ff4b4b;
      --purple: #cc44cc;
      --blue:   #4b8bff;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 1rem;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 40%, rgba(255,75,75,.07), transparent),
        radial-gradient(ellipse 50% 60% at 80% 60%, rgba(75,139,255,.07), transparent);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp 0.6s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 84px;
      height: 84px;
      margin-bottom: 1.4rem;
      filter: drop-shadow(0 4px 16px rgba(255,75,75,.25));
    }

    h1 {
      font-family: 'Segoe UI', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 0.6rem;
      background: linear-gradient(90deg, var(--red), var(--purple), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #888;
      font-size: 0.92rem;
      font-weight: 400;
      margin-bottom: 2.2rem;
      letter-spacing: 0.01em;
      min-height: 1.3em;
      transition: color 0.3s;
    }

    .spinner {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 4px solid #eee;
      border-top-color: var(--red);
      border-right-color: var(--purple);
      animation: spin 0.9s linear infinite;
      margin-bottom: 2rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Progress bar */
    .progress-wrap {
      width: 220px;
      height: 4px;
      background: #eee;
      border-radius: 2px;
      margin-bottom: 1.8rem;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--red), var(--purple), var(--blue));
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Server status grid */
    .server-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      justify-content: center;
      max-width: 280px;
      margin-bottom: 1.8rem;
    }
    .server-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ddd;
      transition: background 0.3s, transform 0.2s;
    }
    .server-dot.checking  { background: #f0c040; animation: pulse 1s ease-in-out infinite; }
    .server-dot.online    { background: #4caf50; transform: scale(1.2); }
    .server-dot.slow      { background: #ff9800; }
    .server-dot.offline   { background: #f44336; }
    .server-dot.selected  { background: var(--blue); transform: scale(1.5);
                            box-shadow: 0 0 0 3px rgba(75,139,255,.25); }

    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }

    .hint {
      font-size: 0.78rem;
      color: #bbb;
      letter-spacing: 0.04em;
    }

    /* Fallback button — shown only if auto-redirect fails */
    .fallback-btn {
      display: none;
      margin-top: 1.4rem;
      padding: 0.6rem 1.6rem;
      background: linear-gradient(90deg, var(--red), var(--purple));
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.01em;
    }
    .fallback-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo"
      src="https://raw.githubusercontent.com/nyelidl/anyone-docking/main/any-L.svg"
      alt="Anyone can dock logo"/>
    <h1>Anyone can dock,<br>everyone can do!</h1>
    <p class="subtitle" id="status">Checking server availability…</p>
    <div class="spinner"></div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="server-grid" id="serverGrid"></div>
    <p class="hint" id="hint">Connecting to the fastest available server</p>
    <button class="fallback-btn" id="fallbackBtn" onclick="redirectToFallback()">
      Open app manually →
    </button>
  </div>

  <script>
    // ── Configuration ─────────────────────────────────────────────────────────
    const APPS = [
      "https://anyone-docking-0.streamlit.app/",
      "https://anyone-docking-1.streamlit.app/",
      "https://anyone-docking-2.streamlit.app/",
      "https://anyone-docking-3.streamlit.app/",
      "https://anyone-docking-4.streamlit.app/",
      "https://anyone-docking-5.streamlit.app/",
      "https://anyone-docking-6.streamlit.app/",
      "https://anyone-docking-7.streamlit.app/",
      "https://anyone-docking-8.streamlit.app/",
      "https://anyone-docking-9.streamlit.app/",
      "https://anyone-docking-10.streamlit.app/",
      "https://anyone-docking-11.streamlit.app/",
      "https://anyone-docking-12.streamlit.app/",
      "https://anyone-docking-13.streamlit.app/",
      "https://anyone-docking-14.streamlit.app/",
      "https://anyone-docking-15.streamlit.app/",
      "https://anyone-docking-16.streamlit.app/",
      "https://anyone-docking-17.streamlit.app/",
      "https://anyone-docking-18.streamlit.app/",
      "https://anyone-docking-19.streamlit.app/",
      "https://anyone-docking-20.streamlit.app/",
    ];

    // How long to wait for a response before marking an app "offline" (ms)
    const TIMEOUT_MS   = 8000;
    // Min delay before redirect (ms) — gives user time to see the UI
    const MIN_DELAY_MS = 1200;
    // Max wait before falling back to random (ms)
    const FALLBACK_MS  = 10000;

    // ── State ─────────────────────────────────────────────────────────────────
    const n           = APPS.length;
    const results     = new Array(n).fill(null); // null | {ok, ms}
    let   redirected  = false;
    let   bestIdx     = -1;
    let   bestMs      = Infinity;
    const startTime   = Date.now();

    // ── Build server dot grid ─────────────────────────────────────────────────
    const grid = document.getElementById("serverGrid");
    const dots = APPS.map((_, i) => {
      const d = document.createElement("div");
      d.className = "server-dot";
      d.title = `Server ${i + 1}`;
      grid.appendChild(d);
      return d;
    });

    // ── Probe all apps in parallel ────────────────────────────────────────────
    // Strategy: race a fetch (no-cors) against an AbortController timeout.
    // The fetch resolves as soon as the server starts sending headers —
    // i.e. the server is awake and responding.  A sleeping Streamlit app
    // on Cloud takes 10–20s to cold-start, so it will timeout here.
    // An awake app typically responds in <1s.

    function setStatus(msg)    { document.getElementById("status").textContent = msg; }
    function setHint(msg)      { document.getElementById("hint").textContent = msg; }
    function setProgress(pct)  { document.getElementById("progressBar").style.width = pct + "%"; }

    function doRedirect(idx) {
      if (redirected) return;
      redirected = true;
      const url = APPS[idx];
      dots[idx].className = "server-dot selected";
      setStatus(`Server ${idx + 1} is ready — redirecting…`);
      setHint(`Fastest response: ${results[idx]?.ms ?? "?"}ms`);
      setProgress(100);
      setTimeout(() => { window.location.href = url; }, 300);
    }

    function redirectToFallback() {
      if (redirected) return;
      // Pick the fastest that responded, or random
      if (bestIdx >= 0) {
        doRedirect(bestIdx);
      } else {
        doRedirect(Math.floor(Math.random() * n));
      }
    }

    function checkProgress() {
      const done = results.filter(r => r !== null).length;
      setProgress(Math.round((done / n) * 90));   // reserve last 10% for redirect
    }

    APPS.forEach((url, i) => {
      dots[i].className = "server-dot checking";

      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), TIMEOUT_MS);
      const t0 = Date.now();

      fetch(url, { mode: "no-cors", signal: controller.signal })
        .then(() => {
          clearTimeout(timer);
          const ms = Date.now() - t0;
          results[i] = { ok: true, ms };

          if (ms < 2000) {
            dots[i].className = "server-dot online";
          } else {
            dots[i].className = "server-dot slow";
          }

          checkProgress();

          // Track best responder
          if (ms < bestMs) {
            bestMs = ms;
            bestIdx = i;
          }

          // Redirect as soon as the first fast response arrives AND min delay passed
          const elapsed = Date.now() - startTime;
          const wait    = Math.max(0, MIN_DELAY_MS - elapsed);
          setTimeout(() => {
            if (!redirected && bestIdx >= 0) {
              setStatus(`Found ${results.filter(r => r?.ok).length} available server(s)`);
              doRedirect(bestIdx);
            }
          }, wait);
        })
        .catch(() => {
          clearTimeout(timer);
          results[i] = { ok: false, ms: null };
          dots[i].className = "server-dot offline";
          checkProgress();
        });
    });

    // ── Hard fallback: if nothing responds in FALLBACK_MS, redirect randomly ──
    setTimeout(() => {
      if (!redirected) {
        const online = results.map((r,i) => r?.ok ? i : -1).filter(i => i >= 0);
        if (online.length > 0) {
          doRedirect(online[Math.floor(Math.random() * online.length)]);
        } else {
          // All timed out — send to random (might be cold-starting)
          setStatus("All servers are starting up…");
          document.getElementById("fallbackBtn").style.display = "inline-block";
          doRedirect(Math.floor(Math.random() * n));
        }
      }
    }, FALLBACK_MS);
  </script>
</body>
</html>
